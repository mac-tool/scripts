name: Publish Scripts Catalog

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.compare.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate searchable scripts catalog
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p _site

          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const { execFileSync } = require("child_process");

          const repo = process.env.GITHUB_REPOSITORY || "mac-tool/scripts";
          const branch = process.env.GITHUB_REF_NAME || "main";

          function walk(dir) {
            let files = [];

            for (const item of fs.readdirSync(dir)) {
              if (
                item.startsWith(".git") ||
                item === "_site" ||
                item === "node_modules"
              ) {
                continue;
              }

              const full = path.join(dir, item);
              const stat = fs.statSync(full);

              if (stat.isDirectory()) {
                files = files.concat(walk(full));
              } else if (item.endsWith(".sh")) {
                files.push(full);
              }
            }

            return files;
          }

          function firstCommentBlock(content) {
            const lines = content.split(/\r?\n/);
            const comments = [];

            for (const line of lines) {
              if (line.startsWith("#!") || line.trim() === "") continue;

              if (line.trim().startsWith("#")) {
                comments.push(line.replace(/^#\s?/, ""));
              } else {
                break;
              }
            }

            return comments.join("\n").trim();
          }

          function extractReadmeOrUsage(content, file) {
            const match = content.match(
              /(?:^|\n)#?\s*((?:README|Usage):[\s\S]{0,3000}?)(?=\n\n|\n# [A-Z][A-Za-z ]+:|\n[a-zA-Z0-9_-]+\(\)|$)/i
            );

            if (match) {
              return match[1]
                .split(/\r?\n/)
                .map(line => line.replace(/^#\s?/, ""))
                .join("\n")
                .trim();
            }

            try {
              const output = execFileSync("bash", [file, "--help"], {
                encoding: "utf8",
                timeout: 3000,
                stdio: ["ignore", "pipe", "pipe"]
              });

              if (output.trim()) return output.trim().slice(0, 3000);
            } catch (_) {}

            try {
              const output = execFileSync("bash", [file, "-h"], {
                encoding: "utf8",
                timeout: 3000,
                stdio: ["ignore", "pipe", "pipe"]
              });

              if (output.trim()) return output.trim().slice(0, 3000);
            } catch (_) {}

            return `bash ${file}`;
          }

          function extractDescription(content, commentBlock, file) {
            const basename = path.basename(file);

            const descFromComment = commentBlock
              .split(/\r?\n/)
              .map(line => line.trim())
              .filter(Boolean)
              .find(line =>
                !line.toLowerCase().startsWith("readme:") &&
                !line.toLowerCase().startsWith("usage:") &&
                !line.toLowerCase().startsWith("author:") &&
                !line.toLowerCase().startsWith("license:") &&
                !line.toLowerCase().startsWith("tags:")
              );

            if (descFromComment) return descFromComment;

            return `Shell script: ${basename}`;
          }

          function extractTags(content, relativePath) {
            const words = new Set();

            relativePath
              .replace(/\.sh$/, "")
              .split(/[\/\-_]+/)
              .forEach(w => w && words.add(w.toLowerCase()));

            const tagMatch = content.match(/#\s*tags?:\s*(.+)/i);

            if (tagMatch) {
              tagMatch[1]
                .split(/[, ]+/)
                .map(x => x.trim().toLowerCase())
                .filter(Boolean)
                .forEach(x => words.add(x));
            }

            return [...words].slice(0, 10);
          }

          const scripts = walk(".")
            .sort()
            .map(file => {
              const content = fs.readFileSync(file, "utf8");
              const relativePath = file.replace(/^\.\//, "");
              const commentBlock = firstCommentBlock(content);

              return {
                name: path.basename(file),
                path: relativePath,
                description: extractDescription(content, commentBlock, relativePath),
                usage: extractReadmeOrUsage(content, relativePath),
                tags: extractTags(content, relativePath),
                source: content,
                sourceUrl: `https://github.com/${repo}/blob/${branch}/${relativePath}`,
                rawUrl: `https://raw.githubusercontent.com/${repo}/${branch}/${relativePath}`
              };
            });

          const scriptsJson = JSON.stringify(scripts, null, 2)
            .replace(/</g, "\\u003c")
            .replace(/\u2028/g, "\\u2028")
            .replace(/\u2029/g, "\\u2029");

          const app = `<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Scripts Catalog</title>

            <script type="importmap">
            {
              "imports": {
                "prism-code-editor": "https://esm.sh/@cyfung1031/prism-code-editor@5.2.0-cdn-esm.1",
                "prism-code-editor/": "https://esm.sh/@cyfung1031/prism-code-editor@5.2.0-cdn-esm.1/"
              }
            }
            </script>

            <style>
              :root {
                color-scheme: dark;
                --bg: #070a13;
                --bg2: #111827;
                --panel: rgba(15, 23, 42, 0.88);
                --panel2: rgba(30, 41, 59, 0.78);
                --text: #e5e7eb;
                --muted: #94a3b8;
                --soft: #cbd5e1;
                --brand: #38bdf8;
                --good: #22c55e;
                --bad: #fb7185;
                --border: rgba(148, 163, 184, 0.24);
                --shadow: rgba(0, 0, 0, 0.34);
              }

              html[data-theme="light"] {
                color-scheme: light;
                --bg: #f8fafc;
                --bg2: #e2e8f0;
                --panel: rgba(255, 255, 255, 0.92);
                --panel2: rgba(241, 245, 249, 0.96);
                --text: #0f172a;
                --muted: #64748b;
                --soft: #334155;
                --brand: #0369a1;
                --good: #059669;
                --bad: #be123c;
                --border: rgba(100, 116, 139, 0.30);
                --shadow: rgba(15, 23, 42, 0.12);
              }

              * {
                box-sizing: border-box;
              }

              body {
                margin: 0;
                min-height: 100vh;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                color: var(--text);
                background:
                  radial-gradient(circle at 10% 0%, rgba(56, 189, 248, 0.20), transparent 32rem),
                  radial-gradient(circle at 90% 0%, rgba(167, 139, 250, 0.18), transparent 34rem),
                  linear-gradient(180deg, var(--bg), var(--bg2));
              }

              a {
                color: inherit;
              }

              .app {
                max-width: 1440px;
                margin: 0 auto;
                padding: 1rem;
              }

              .hero {
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 1rem;
                align-items: start;
                padding: 2rem 0 1rem;
              }

              .badge {
                display: inline-flex;
                align-items: center;
                gap: 0.45rem;
                border: 1px solid var(--border);
                border-radius: 999px;
                padding: 0.38rem 0.68rem;
                color: var(--muted);
                background: var(--panel);
                font-weight: 800;
                font-size: 0.82rem;
              }

              h1 {
                margin: 0.75rem 0 0;
                max-width: 920px;
                font-size: clamp(2.35rem, 6vw, 5rem);
                line-height: 0.95;
                letter-spacing: -0.06em;
              }

              .subtitle {
                max-width: 760px;
                margin: 0.85rem 0 0;
                color: var(--muted);
                font-size: 1rem;
                line-height: 1.55;
              }

              .top-actions {
                display: flex;
                gap: 0.55rem;
                justify-content: flex-end;
                flex-wrap: wrap;
              }

              .btn,
              .mini-btn {
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 0.42rem;
                border: 1px solid var(--border);
                border-radius: 999px;
                background: var(--panel);
                color: var(--text);
                text-decoration: none;
                font-weight: 850;
                box-shadow: 0 16px 42px var(--shadow);
              }

              .btn {
                padding: 0.66rem 0.9rem;
                font-size: 0.86rem;
              }

              .mini-btn {
                padding: 0.52rem 0.72rem;
                font-size: 0.80rem;
              }

              .btn:hover,
              .mini-btn:hover {
                border-color: var(--brand);
              }

              .layout {
                display: grid;
                grid-template-columns: 360px minmax(0, 1fr);
                gap: 1rem;
                align-items: start;
              }

              .sidebar,
              .workspace {
                border: 1px solid var(--border);
                border-radius: 1.4rem;
                background: var(--panel);
                box-shadow: 0 24px 70px var(--shadow);
                overflow: hidden;
              }

              .sidebar {
                position: sticky;
                top: 1rem;
                max-height: calc(100vh - 2rem);
                display: grid;
                grid-template-rows: auto auto 1fr;
              }

              .search-area {
                padding: 1rem;
                border-bottom: 1px solid var(--border);
              }

              .search-area label {
                display: block;
                margin-bottom: 0.45rem;
                color: var(--muted);
                font-size: 0.76rem;
                font-weight: 900;
                letter-spacing: 0.06em;
                text-transform: uppercase;
              }

              #search {
                width: 100%;
                border: 1px solid var(--border);
                border-radius: 0.95rem;
                background: var(--panel2);
                color: var(--text);
                outline: none;
                padding: 0.9rem 1rem;
                font-size: 0.96rem;
              }

              #search:focus {
                border-color: var(--brand);
                box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
              }

              .stats {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0.6rem;
                padding: 0.85rem 1rem;
                border-bottom: 1px solid var(--border);
              }

              .stat {
                border: 1px solid var(--border);
                border-radius: 0.9rem;
                padding: 0.72rem;
                background: var(--panel2);
              }

              .stat strong {
                display: block;
                font-size: 1.25rem;
                line-height: 1;
              }

              .stat span {
                display: block;
                margin-top: 0.28rem;
                color: var(--muted);
                font-size: 0.72rem;
                font-weight: 850;
              }

              .script-list {
                overflow: auto;
                padding: 0.7rem;
              }

              .script-item {
                width: 100%;
                text-align: left;
                cursor: pointer;
                border: 1px solid transparent;
                border-radius: 1rem;
                background: transparent;
                color: var(--text);
                padding: 0.82rem;
                margin-bottom: 0.45rem;
              }

              .script-item:hover,
              .script-item.active {
                border-color: var(--border);
                background: var(--panel2);
              }

              .script-item.active {
                box-shadow: inset 3px 0 0 var(--brand);
              }

              .item-name {
                font-weight: 900;
                overflow-wrap: anywhere;
              }

              .item-desc {
                margin-top: 0.3rem;
                color: var(--muted);
                font-size: 0.82rem;
                line-height: 1.4;
              }

              .item-tags,
              .script-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.28rem;
                margin-top: 0.55rem;
              }

              .tag {
                border: 1px solid var(--border);
                border-radius: 999px;
                color: var(--muted);
                padding: 0.18rem 0.45rem;
                font-size: 0.68rem;
                font-weight: 800;
              }

              .workspace-head {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 1rem;
                padding: 1rem 1.15rem;
                border-bottom: 1px solid var(--border);
              }

              .script-title {
                margin: 0;
                font-size: 1.35rem;
                letter-spacing: -0.035em;
                overflow-wrap: anywhere;
              }

              .script-path {
                margin-top: 0.35rem;
                color: var(--muted);
                font-size: 0.82rem;
                overflow-wrap: anywhere;
              }

              .script-desc {
                margin: 0.7rem 0 0;
                color: var(--soft);
                line-height: 1.5;
                font-size: 0.92rem;
              }

              .workspace-actions {
                display: flex;
                gap: 0.5rem;
                justify-content: flex-end;
                flex-wrap: wrap;
                align-content: start;
              }

              .workspace-body {
                display: grid;
                grid-template-columns: minmax(240px, 0.55fr) minmax(560px, 1.45fr);
                min-height: 720px;
              }

              .readme-pane {
                border-right: 1px solid var(--border);
                min-width: 0;
                background: var(--panel2);
              }

              .pane-title {
                display: flex;
                align-items: center;
                justify-content: space-between;
                min-height: 2.75rem;
                border-bottom: 1px solid var(--border);
                padding: 0.68rem 0.9rem;
                color: var(--muted);
                font-size: 0.72rem;
                font-weight: 950;
                text-transform: uppercase;
                letter-spacing: 0.06em;
              }

              .readme {
                margin: 0;
                padding: 0.9rem 1rem;
                max-height: 360px;
                overflow: auto;
                white-space: pre-wrap;
                color: var(--soft);
                font-size: 0.8rem;
                line-height: 1.48;
              }

              .code-pane {
                min-width: 0;
              }

              .tabs {
                display: flex;
                gap: 0.45rem;
              }

              .tab {
                cursor: pointer;
                border: 1px solid var(--border);
                border-radius: 999px;
                background: transparent;
                color: var(--muted);
                padding: 0.34rem 0.58rem;
                font-size: 0.7rem;
                font-weight: 950;
              }

              .tab.active {
                color: var(--text);
                border-color: var(--brand);
                background: rgba(56, 189, 248, 0.12);
              }

              .editor-wrap {
                padding: 0.9rem 1rem 1rem;
              }

              .editor-meta {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 0.75rem;
                margin-bottom: 0.55rem;
                color: var(--muted);
                font-size: 0.78rem;
                font-weight: 850;
              }

              .grammar-ok {
                color: var(--good);
              }

              .grammar-bad {
                color: var(--bad);
              }

              .editor-host {
                position: relative;
                display: block;
                height: min(78vh, 860px);
                min-height: 620px;
                border: 1px solid var(--border);
                border-radius: 1rem;
                overflow: auto;
                background: var(--panel2);
                font-size: 0.78rem;
                line-height: 1.45;
              }

              .editor-host.hidden {
                display: none;
              }

              .editor-host > * {
                height: 100%;
                min-height: 100%;
              }

              .fallback-editor {
                width: 100%;
                height: 100%;
                min-height: 620px;
                resize: vertical;
                border: 0;
                outline: 0;
                padding: 0.85rem;
                font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
                font-size: 0.78rem;
                line-height: 1.45;
                color: var(--text);
                background: var(--panel2);
                overflow: auto;
              }

              .copy-row {
                display: flex;
                align-items: center;
                gap: 0.55rem;
                flex-wrap: wrap;
                margin-top: 0.85rem;
              }

              .status {
                color: var(--good);
                font-size: 0.82rem;
                font-weight: 900;
              }

              .empty {
                padding: 2rem;
                color: var(--muted);
                text-align: center;
              }

              @media (max-width: 1040px) {
                .layout {
                  grid-template-columns: 1fr;
                }

                .sidebar {
                  position: static;
                  max-height: none;
                }

                .script-list {
                  max-height: 360px;
                }

                .workspace-body {
                  grid-template-columns: 1fr;
                  min-height: auto;
                }

                .readme-pane {
                  border-right: 0;
                  border-bottom: 1px solid var(--border);
                }

                .readme {
                  max-height: 260px;
                }
              }

              @media (max-width: 720px) {
                .hero,
                .workspace-head {
                  grid-template-columns: 1fr;
                }

                .top-actions,
                .workspace-actions {
                  justify-content: flex-start;
                }

                .editor-host {
                  height: 68vh;
                  min-height: 420px;
                  max-height: none;
                }

                .fallback-editor {
                  min-height: 420px;
                }
              }
            </style>

            <script>
              const savedTheme = localStorage.getItem("scriptsCatalogTheme");
              const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
              document.documentElement.dataset.theme = savedTheme || (prefersLight ? "light" : "dark");
            </script>
          </head>

          <body>
            <div class="app">
              <header class="hero">
                <div>
                  <div class="badge">🧰 Searchable shell script toolbox</div>
                  <h1>Scripts Catalog</h1>
                  <p class="subtitle">
                    Search, preview, edit a scratch copy, and copy shell scripts directly from the browser.
                  </p>
                </div>

                <div class="top-actions">
                  <button id="themeToggle" class="btn" type="button">Theme</button>
                  <a class="btn" href="https://github.com/${repo}">GitHub repo</a>
                </div>
              </header>

              <main class="layout">
                <aside class="sidebar">
                  <div class="search-area">
                    <label for="search">Search</label>
                    <input id="search" type="search" placeholder="github, folder, icon, png..." autofocus />
                  </div>

                  <div class="stats">
                    <div class="stat">
                      <strong id="totalScripts">0</strong>
                      <span>Total</span>
                    </div>
                    <div class="stat">
                      <strong id="shownScripts">0</strong>
                      <span>Shown</span>
                    </div>
                    <div class="stat">
                      <strong id="grammarStatusShort">?</strong>
                      <span>Bash</span>
                    </div>
                  </div>

                  <div id="scriptList" class="script-list"></div>
                </aside>

                <section id="workspace" class="workspace"></section>
              </main>
            </div>

            <script type="module">
              import { basicEditor, readonlyEditor } from "prism-code-editor/setups";
              import { languages } from "prism-code-editor/prism";
              import { loadTheme, registerTheme } from "prism-code-editor/themes";

              import "prism-code-editor/prism/languages/bash.js";
              import "prism-code-editor/languages/bash";

              registerTheme("catalog-dark", async () => ({
                default: await loadTheme("github-dark") || ""
              }));

              registerTheme("catalog-light", async () => ({
                default: await loadTheme("github-light") || ""
              }));

              const bashGrammar = languages.bash || languages.sh || languages.shell;

              const BASH_LANGUAGE = languages.bash
                ? "bash"
                : languages.sh
                  ? "sh"
                  : languages.shell
                    ? "shell"
                    : "bash";

              console.log("Bash grammar loaded:", !!bashGrammar, bashGrammar);
              console.log("Using Prism Code Editor language:", BASH_LANGUAGE);

              const scripts = ${scriptsJson};

              const search = document.querySelector("#search");
              const scriptList = document.querySelector("#scriptList");
              const workspace = document.querySelector("#workspace");
              const themeToggle = document.querySelector("#themeToggle");
              const totalScripts = document.querySelector("#totalScripts");
              const shownScripts = document.querySelector("#shownScripts");
              const grammarStatusShort = document.querySelector("#grammarStatusShort");

              let filtered = scripts.slice();
              let selectedPath = scripts[0]?.path || "";
              let currentEditors = null;
              let activeTab = "original";

              const scratchValues = new Map();

              totalScripts.textContent = scripts.length;
              grammarStatusShort.textContent = bashGrammar ? "OK" : "NO";
              grammarStatusShort.style.color = bashGrammar ? "var(--good)" : "var(--bad)";

              function escapeHtml(str) {
                return String(str)
                  .replaceAll("&", "&amp;")
                  .replaceAll("<", "&lt;")
                  .replaceAll(">", "&gt;")
                  .replaceAll('"', "&quot;")
                  .replaceAll("'", "&#039;");
              }

              function appTheme() {
                return document.documentElement.dataset.theme === "light" ? "light" : "dark";
              }

              function editorTheme() {
                return appTheme() === "light" ? "catalog-light" : "catalog-dark";
              }

              function currentScript() {
                return filtered.find(item => item.path === selectedPath) || filtered[0] || null;
              }

              function snapshotScratch() {
                const script = currentScript();
                if (!script || !currentEditors?.scratch) return;

                if (typeof currentEditors.scratch.value === "string") {
                  scratchValues.set(script.path, currentEditors.scratch.value);
                }
              }

              function setTheme(theme) {
                snapshotScratch();

                document.documentElement.dataset.theme = theme;
                localStorage.setItem("scriptsCatalogTheme", theme);
                themeToggle.textContent = theme === "light" ? "Dark theme" : "Light theme";

                if (workspace.innerHTML.trim()) {
                  renderWorkspace();
                }
              }

              function getScratch(script) {
                return scratchValues.get(script.path) || script.source;
              }

              function saveScratch(script, value) {
                scratchValues.set(script.path, value);
              }

              function copyText(text, statusEl, message) {
                navigator.clipboard.writeText(text).then(() => {
                  statusEl.textContent = message;
                  setTimeout(() => {
                    statusEl.textContent = "";
                  }, 1500);
                }).catch(() => {
                  statusEl.textContent = "Copy failed";
                });
              }

              function fallbackEditor(host, value, readOnly, onUpdate) {
                host.innerHTML = "";
                const textarea = document.createElement("textarea");
                textarea.className = "fallback-editor";
                textarea.value = value;
                textarea.readOnly = readOnly;
                host.appendChild(textarea);

                textarea.addEventListener("input", () => onUpdate(textarea.value));

                return {
                  get value() {
                    return textarea.value;
                  },
                  update() {}
                };
              }

              function makeEditor(host, script, readOnly) {
                const value = readOnly ? script.source : getScratch(script);

                if (!bashGrammar) {
                  return fallbackEditor(host, value, readOnly, next => {
                    if (!readOnly) saveScratch(script, next);
                  });
                }

                try {
                  const options = {
                    language: BASH_LANGUAGE,
                    theme: editorTheme(),
                    value,
                    lineNumbers: true,
                    wordWrap: true,
                    tabSize: 2,
                    insertSpaces: true,
                    readOnly,
                    onUpdate(editor) {
                      if (!readOnly) saveScratch(script, editor.value);
                    }
                  };

                  return readOnly
                    ? readonlyEditor(host, options)
                    : basicEditor(host, options);
                } catch (error) {
                  console.warn("Prism Code Editor failed; using textarea fallback:", error);

                  return fallbackEditor(host, value, readOnly, next => {
                    if (!readOnly) saveScratch(script, next);
                  });
                }
              }

              function refreshVisibleEditor() {
                requestAnimationFrame(() => {
                  const editor = activeTab === "original"
                    ? currentEditors?.original
                    : currentEditors?.scratch;

                  if (editor && typeof editor.update === "function") {
                    editor.update();
                  }

                  if (editor && typeof editor.refresh === "function") {
                    editor.refresh();
                  }
                });
              }

              function renderList() {
                shownScripts.textContent = filtered.length;

                if (!filtered.length) {
                  scriptList.innerHTML = '<div class="empty">No scripts matched.</div>';
                  workspace.innerHTML = '<div class="empty">Try a different search.</div>';
                  return;
                }

                if (!filtered.some(script => script.path === selectedPath)) {
                  selectedPath = filtered[0].path;
                }

                scriptList.innerHTML = filtered.map(script => {
                  return ''
                    + '<button class="script-item ' + (script.path === selectedPath ? 'active' : '') + '" type="button" data-path="' + escapeHtml(script.path) + '">'
                    + '  <div class="item-name">' + escapeHtml(script.name) + '</div>'
                    + '  <div class="item-desc">' + escapeHtml(script.description) + '</div>'
                    + '  <div class="item-tags">'
                    +      (script.tags || []).map(tag => '<span class="tag">' + escapeHtml(tag) + '</span>').join("")
                    + '  </div>'
                    + '</button>';
                }).join("");

                scriptList.querySelectorAll(".script-item").forEach(button => {
                  button.addEventListener("click", () => {
                    snapshotScratch();
                    selectedPath = button.dataset.path;
                    activeTab = "original";
                    render();
                  });
                });
              }

              function showTab(tab) {
                activeTab = tab;

                const originalHost = workspace.querySelector(".original-host");
                const scratchHost = workspace.querySelector(".scratch-host");
                const originalTab = workspace.querySelector(".tab-original");
                const scratchTab = workspace.querySelector(".tab-scratch");

                if (!originalHost || !scratchHost) return;

                originalHost.classList.toggle("hidden", tab !== "original");
                scratchHost.classList.toggle("hidden", tab !== "scratch");
                originalTab.classList.toggle("active", tab === "original");
                scratchTab.classList.toggle("active", tab === "scratch");

                refreshVisibleEditor();
              }

              function renderWorkspace() {
                const script = currentScript();
                if (!script) return;

                currentEditors = null;

                workspace.innerHTML = ''
                  + '<div class="workspace-head">'
                  + '  <div>'
                  + '    <h2 class="script-title">' + escapeHtml(script.name) + '</h2>'
                  + '    <div class="script-path">' + escapeHtml(script.path) + '</div>'
                  + '    <p class="script-desc">' + escapeHtml(script.description) + '</p>'
                  + '    <div class="script-tags">'
                  +        (script.tags || []).map(tag => '<span class="tag">' + escapeHtml(tag) + '</span>').join("")
                  + '    </div>'
                  + '  </div>'
                  + '  <div class="workspace-actions">'
                  + '    <button class="mini-btn copy-original-top" type="button">Copy original</button>'
                  + '    <button class="mini-btn copy-edited-top" type="button">Copy edited</button>'
                  + '    <a class="mini-btn" href="' + script.sourceUrl + '">Source</a>'
                  + '    <a class="mini-btn" href="' + script.rawUrl + '">Raw</a>'
                  + '  </div>'
                  + '</div>'
                  + '<div class="workspace-body">'
                  + '  <section class="readme-pane">'
                  + '    <div class="pane-title">README / Usage</div>'
                  + '    <pre class="readme"><code>' + escapeHtml(script.usage) + '</code></pre>'
                  + '  </section>'
                  + '  <section class="code-pane">'
                  + '    <div class="pane-title">'
                  + '      <span>Code workspace</span>'
                  + '      <div class="tabs">'
                  + '        <button class="tab tab-original active" type="button">Original</button>'
                  + '        <button class="tab tab-scratch" type="button">Scratch edit</button>'
                  + '      </div>'
                  + '    </div>'
                  + '    <div class="editor-wrap">'
                  + '      <div class="editor-meta">'
                  + '        <span>Original is read-only. Scratch edit is browser-only.</span>'
                  + '        <span class="' + (bashGrammar ? 'grammar-ok' : 'grammar-bad') + '">Bash grammar: ' + (bashGrammar ? 'loaded' : 'missing') + '</span>'
                  + '      </div>'
                  + '      <div class="editor-host original-host"></div>'
                  + '      <div class="editor-host scratch-host hidden"></div>'
                  + '      <div class="copy-row">'
                  + '        <button class="mini-btn copy-original" type="button">Copy original</button>'
                  + '        <button class="mini-btn copy-edited" type="button">Copy edited</button>'
                  + '        <button class="mini-btn reset-edited" type="button">Reset scratch</button>'
                  + '        <span class="status"></span>'
                  + '      </div>'
                  + '    </div>'
                  + '  </section>'
                  + '</div>';

                const originalHost = workspace.querySelector(".original-host");
                const scratchHost = workspace.querySelector(".scratch-host");
                const status = workspace.querySelector(".status");

                currentEditors = {
                  original: makeEditor(originalHost, script, true),
                  scratch: makeEditor(scratchHost, script, false)
                };

                requestAnimationFrame(() => {
                  for (const editor of Object.values(currentEditors || {})) {
                    if (editor && typeof editor.update === "function") {
                      editor.update();
                    }

                    if (editor && typeof editor.refresh === "function") {
                      editor.refresh();
                    }
                  }
                });

                showTab(activeTab);

                workspace.querySelector(".tab-original").addEventListener("click", () => showTab("original"));
                workspace.querySelector(".tab-scratch").addEventListener("click", () => showTab("scratch"));

                workspace.querySelector(".copy-original").addEventListener("click", () => {
                  copyText(script.source, status, "Original copied");
                });

                workspace.querySelector(".copy-original-top").addEventListener("click", () => {
                  copyText(script.source, status, "Original copied");
                });

                workspace.querySelector(".copy-edited").addEventListener("click", () => {
                  const edited = currentEditors?.scratch?.value || getScratch(script);
                  saveScratch(script, edited);
                  copyText(edited, status, "Edited copy copied");
                });

                workspace.querySelector(".copy-edited-top").addEventListener("click", () => {
                  const edited = currentEditors?.scratch?.value || getScratch(script);
                  saveScratch(script, edited);
                  copyText(edited, status, "Edited copy copied");
                });

                workspace.querySelector(".reset-edited").addEventListener("click", () => {
                  saveScratch(script, script.source);
                  activeTab = "scratch";
                  renderWorkspace();

                  const newStatus = workspace.querySelector(".status");
                  newStatus.textContent = "Scratch reset";
                  setTimeout(() => {
                    newStatus.textContent = "";
                  }, 1300);
                });
              }

              function render() {
                snapshotScratch();

                const q = search.value.trim().toLowerCase();

                filtered = scripts.filter(script => {
                  const haystack = [
                    script.name,
                    script.path,
                    script.description,
                    script.usage,
                    script.source,
                    ...(script.tags || [])
                  ].join(" ").toLowerCase();

                  return haystack.includes(q);
                });

                renderList();
                renderWorkspace();
              }

              search.addEventListener("input", () => {
                activeTab = "original";
                render();
              });

              themeToggle.addEventListener("click", () => {
                setTheme(appTheme() === "light" ? "dark" : "light");
              });

              setTheme(document.documentElement.dataset.theme || "dark");
              render();
            </script>
          </body>
          </html>`;

          fs.writeFileSync("_site/index.html", app);
          fs.writeFileSync("_site/scripts.json", JSON.stringify(scripts, null, 2));

          console.log(`Generated catalog for ${scripts.length} scripts.`);
          NODE

      - name: Calculate generated site hash
        shell: bash
        run: |
          set -euo pipefail

          cd _site

          find . \
            -type f \
            ! -name "site.sha256" \
            -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | awk '{print $1}' > site.sha256

          echo "Generated site hash:"
          cat site.sha256

      - name: Compare with currently published site
        id: compare
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"

          if [ "$REPO" = "${OWNER}.github.io" ]; then
            PAGES_URL="https://${OWNER}.github.io"
          else
            PAGES_URL="https://${OWNER}.github.io/${REPO}"
          fi

          LOCAL_HASH="$(cat _site/site.sha256)"
          REMOTE_HASH="$(curl -fsSL "${PAGES_URL}/site.sha256" || true)"

          echo "Local hash:  ${LOCAL_HASH}"
          echo "Remote hash: ${REMOTE_HASH:-none}"

          if [ "$LOCAL_HASH" = "$REMOTE_HASH" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated site changes. Skipping GitHub Pages deploy."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Generated site changed. Deploying GitHub Pages."
          fi

      - name: Upload GitHub Pages artifact
        if: steps.compare.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: needs.build.outputs.changed == 'true'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
